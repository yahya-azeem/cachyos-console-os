# CachyOS Live ISO — Limine Bootloader Configuration
# This file is placed at /boot/limine/limine.conf on the ISO.
# Placeholders %INSTALL_DIR%, %ARCH%, and %ARCHISO_UUID% are replaced at build time.

timeout: 10
default_entry: 1
interface_branding: CachyOS Live ISO

# ——— CachyOS (default, CachyOS-optimized kernel) ———
/CachyOS Live
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos
    kernel_cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=auto module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos.img

# ——— CachyOS LTS Kernel ———
/CachyOS Live (LTS Kernel)
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
    kernel_cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=auto module_blacklist=pcspkr i915.modeset=1 amdgpu.modeset=1 nvme_load=yes
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img

# ——— Legacy Hardware (nomodeset — for GPU issues) ———
/CachyOS Legacy Hardware (nomodeset)
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-cachyos-lts
    kernel_cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=auto module_blacklist=nvidia,nvidia_modeset,nvidia_uvm,nvidia_drm nomodeset nvme_load=yes
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-cachyos-lts.img
