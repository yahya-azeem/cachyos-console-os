name: Console OS ISO
on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    name: Build Console ISO
    outputs:
      builddate: ${{ steps.date.outputs.builddate }}
    steps:
      - name: Get build date
        id: date
        run: |
          echo "builddate=$(date +'%y%m%d')" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add CachyOS keyring
        run: |
          pacman-key --init
          pacman-key --recv-keys F3B607488DB35A47 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key F3B607488DB35A47
          sed -i '/^\[core\]$/i[cachyos]\nServer = https://mirror.cachyos.org/repo/$arch/$repo\n' /etc/pacman.conf

      - name: Install dependencies
        run: |
          sudo pacman -Syu --noconfirm archiso cachyos-keyring mkinitcpio-archiso squashfs-tools grub limine xorriso git unzip curl

      - name: Download Pegasus Frontend
        run: |
          echo "Fetching latest continuous Pegasus Linux release..."
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/mmatyas/pegasus-frontend/releases/tags/continuous | grep -oE 'https://github.com/mmatyas/pegasus-frontend/releases/download/continuous/pegasus-fe_[^"]+_x11-static.zip' | head -n 1)
          echo "Download URL: $DOWNLOAD_URL"
          curl -L -o pegasus.zip "$DOWNLOAD_URL"
          unzip -o pegasus.zip pegasus-fe
          mkdir -p archiso/airootfs/usr/local/bin
          cp pegasus-fe archiso/airootfs/usr/local/bin/
          chmod +x archiso/airootfs/usr/local/bin/pegasus-fe

      - name: Clone ProsperoOS theme
        run: |
          echo "Cloning prosperoOS theme..."
          mkdir -p archiso/airootfs/etc/skel/.config/pegasus-frontend/themes/prosperoOS
          git clone https://github.com/PlayingKarrde/prosperoOS.git archiso/airootfs/etc/skel/.config/pegasus-frontend/themes/prosperoOS

      - name: Create build user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chmod -R a+rw .

      - name: Build ISO
        run: |
          ./build-limine-iso.sh -v

      - name: Upload ISO to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-console-os-${{ steps.date.outputs.builddate }}
          path: out/limine/*.iso

  release:
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: cachyos-console-os-${{ needs.build.outputs.builddate }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.builddate }}
          name: Release v${{ needs.build.outputs.builddate }}
          body: |
            CachyOS Console OS (Limine + Pegasus Frontend + ProsperoOS Theme)
            Built on ${{ needs.build.outputs.builddate }}
          files: |
            *.iso
            *.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
